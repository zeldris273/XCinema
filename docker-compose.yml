version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: movieapp-postgres
    environment:
      POSTGRES_DB: MovieApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - movieapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Movie_BE
      dockerfile: Dockerfile
    container_name: movieapp-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=MovieApp;Username=postgres;Password=12345
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - movieapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./Movie_FE
      dockerfile: Dockerfile
    container_name: movieapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - movieapp-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  movieapp-network:
    driver: bridge
